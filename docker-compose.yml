version: '3.8'

services:
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_production_service
    ports:
      - "8000:8000"
    volumes:
      - application_state_data:/app/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  application_state_data:
    driver: local
